<style>
/* Phase 2 homepage layer: composition only. Tokens and primitives come from theme.css. */
.dashboard-page {
  padding-bottom: calc(var(--os-bottom-nav-h) + var(--os-space-10));
}
.dashboard-shell {
  max-width: 1180px;
  display: grid;
  gap: var(--os-space-5);
}
.command-hero {
  min-height: min(74vh, 620px);
  display: grid;
  align-content: space-between;
  gap: var(--os-space-8);
  position: relative;
  overflow: hidden;
  padding: clamp(18px, 4vw, 38px);
  border-radius: var(--os-radius-2xl);
  border: 1px solid rgba(255,255,255,0.1);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.018)),
    radial-gradient(90% 70% at 50% 105%, rgba(var(--os-accent-rgb), 0.18), transparent 66%),
    linear-gradient(180deg, #050507 0%, #08090d 100%);
  box-shadow: 0 1px 0 rgba(255,255,255,0.07) inset, 0 50px 120px -70px rgba(0,0,0,0.96);
}
.command-hero::before {
  content: "";
  position: absolute;
  inset: 18% 0 0;
  pointer-events: none;
  opacity: 0.36;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: linear-gradient(180deg, transparent, #000 28%, transparent 100%);
}
.command-hero::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -180px;
  width: min(760px, 92vw);
  height: 360px;
  transform: translateX(-50%);
  pointer-events: none;
  background:
    radial-gradient(ellipse at center, rgba(var(--os-accent-rgb), 0.24), transparent 58%),
    radial-gradient(ellipse at center, rgba(var(--os-success-rgb), 0.08), transparent 70%);
  filter: blur(4px);
}
.command-hero-top,
.command-hero-bottom,
.snapshot-head,
.dock-head,
.mini-row,
.reminders {
  display: flex;
  align-items: center;
  gap: var(--os-space-3);
}
.command-hero-top,
.command-hero-bottom,
.snapshot-head,
.dock-head {
  justify-content: space-between;
}
.command-hero-bottom {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.hero-copy {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}
.hero-title {
  margin: 0;
  font-family: var(--os-font-display);
  font-size: clamp(3.4rem, 13vw, 7.5rem);
  line-height: 0.95;
  letter-spacing: var(--os-tracking-tight);
}
.hero-subtitle {
  margin: var(--os-space-3) 0 0;
  max-width: 58ch;
  color: var(--os-text-3);
  line-height: var(--os-leading-body);
  margin-left: auto;
  margin-right: auto;
}
.command-search {
  position: relative;
  z-index: 2;
  min-height: var(--os-touch);
  min-width: min(100%, 420px);
  margin: 0 auto;
  justify-content: flex-start;
  color: var(--os-text-2);
  border-color: var(--os-border-2);
  background: rgba(28, 29, 36, 0.76);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 26px 70px -44px rgba(0,0,0,0.95);
}
.command-search kbd {
  margin-left: auto;

  font-family: var(--os-font-mono);
  font-size: var(--os-text-2xs);
  border: 1px solid var(--os-border-1);
  border-radius: var(--os-radius-xs);

}
.hero-status {
  display: flex;
  flex-wrap: wrap;
  gap: var(--os-space-2);
}
.hero-status .os-chip {
  min-height: 34px;
}
.profileChip {
  min-height: 36px;
}
.profileAvatar {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border-radius: var(--os-radius-pill);
  background: var(--os-gradient-brand);

  font-family: var(--os-font-display);
  font-size: var(--os-text-xs);
  font-weight: 700;
}
.profileChipNew {

  border-color: var(--os-accent-line);

}
.themeSeg {
  margin-left: auto;
}
.overview-grid,
.snapshot-grid,
.launcher-grid,
.stat-grid {
  display: grid;
  gap: var(--os-space-4);
}
.overview-grid {
  grid-template-columns: 1.2fr 0.8fr;
}
.snapshot-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.launcher-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.stat-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.today-card,
.snapshot-card,
.launcher-card,
.live-strip {
  min-width: 0;
}
.today-card {
  display: grid;
  align-content: space-between;
  min-height: 390px;
  padding: clamp(18px, 3vw, 30px);
}
.vitals-stage {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: var(--os-space-6);
  margin: var(--os-space-6) 0;
}
.recRing {
  --ring-tone: var(--os-accent);
  position: relative;
  width: clamp(132px, 34vw, 176px);
  height: clamp(132px, 34vw, 176px);
  display: grid;
  place-items: center;
}
.recRing svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.recTrack {
  fill: none;
  stroke: var(--track);
  stroke-width: 9;
}
.recFill {
  fill: none;
  stroke: var(--ring-tone);
  stroke-width: 9;
  stroke-linecap: round;
  filter: drop-shadow(0 0 10px var(--ring-tone));
}
.recRing[data-tone="good"] { --ring-tone: var(--os-success); }
.recRing[data-tone="watch"] { --ring-tone: var(--os-warning); }
.recRing[data-tone="low"] { --ring-tone: var(--os-danger); }
.recRing[data-tone="muted"] { --ring-tone: var(--os-text-4); }
.recNum {
  font-family: var(--os-font-display);
  font-size: clamp(2.25rem, 9vw, 4rem);
  line-height: 1;
  letter-spacing: var(--os-tracking-tight);
  font-variant-numeric: tabular-nums;
}
.recUnit,
.recCap,
.vLabel,
.ticker-label,
.snapshot-kicker,
.remindersLabel {
  font-family: var(--os-font-mono);
  font-size: var(--os-text-2xs);
  letter-spacing: var(--os-tracking-caps);
  text-transform: uppercase;
  color: var(--os-text-3);
}
.recUnit {
  font-size: var(--os-text-sm);
  letter-spacing: 0;
}
.vMetrics {
  display: grid;
  gap: var(--os-space-3);
}
.vRow {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--os-space-3);
  padding-bottom: var(--os-space-2);
  border-bottom: 1px solid var(--os-border-1);
}
.vRow:last-child {
  border-bottom: 0;
}
.vVal {
  color: var(--os-text-1);
  font-family: var(--os-font-display);
  font-size: var(--os-text-lg);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.vVal em {
  margin-left: 4px;
  color: var(--os-text-3);
  font-family: var(--os-font-mono);
  font-size: var(--os-text-xs);
  font-style: normal;
}
.today-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--os-space-3);
  flex-wrap: wrap;
}
.vitalsEmptyBody,
.snapshot-body,
.cardTag,
.empty-note {
  color: var(--os-text-3);
  line-height: 1.5;
}
.mini-stack,
.snapshot-card,
.launcher-card,
.live-strip {
  display: grid;
  gap: var(--os-space-3);
}
.mini-stack .stat-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.mini-stat {
  padding: var(--os-space-4);
  min-height: 118px;
}
.mini-label,
.cardStatLabel {
  font-family: var(--os-font-mono);
  font-size: var(--os-text-2xs);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--os-text-3);
}
.mini-value,
.cardStatValue,
.snapshot-value {
  font-family: var(--os-font-display);
  font-size: var(--os-text-xl);
  font-weight: 600;
  letter-spacing: var(--os-tracking-ui);
  color: var(--os-text-1);
  font-variant-numeric: tabular-nums;
}
.live-strip {
  overflow: hidden;
  padding: 0;
}
.ticker {
  display: grid;
  gap: var(--os-space-3);
}
.ticker-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--os-space-3);
  padding: var(--os-space-4) var(--os-space-4) 0;
}
.ticker-viewport {
  overflow: hidden;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
}
.ticker-track {
  display: flex;
  width: max-content;
  animation: tickerScroll linear infinite;
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: var(--os-space-3);
  min-height: 54px;
  padding: 0 var(--os-space-4);
  border-right: 1px solid var(--os-border-1);
  color: var(--os-accent);
  white-space: nowrap;
}
.ticker-value {
  color: var(--os-text-1);
  font-family: var(--os-font-display);
  font-size: var(--os-text-lg);
  font-weight: 600;
}
.ticker-unit {
  margin-left: 3px;
  color: var(--os-text-3);
  font-family: var(--os-font-mono);
  font-size: var(--os-text-xs);
}
.ticker-item[data-tone="good"] { color: var(--os-success); }
.ticker-item[data-tone="watch"] { color: var(--os-warning); }
.ticker-item[data-tone="low"] { color: var(--os-danger); }
.ticker-item[data-tone="muted"] { color: var(--os-text-3); }
@keyframes tickerScroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
.reminders {
  flex-wrap: wrap;
}
.reminderChip {
  text-decoration: none;
}
.snapshot-card {
  min-height: 230px;
}
.snapshot-card.is-wide {
  grid-column: span 2;
}
.snapshot-icon,
.cardIcon {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  border-radius: var(--os-radius-md);
  color: var(--os-accent-2);
  background: var(--os-accent-soft);
  border: 1px solid var(--os-accent-line);
}
.snapshot-icon svg,
.cardIcon svg,
.command-search svg,
.os-mobile-bottom-nav svg {
  width: 18px;
  height: 18px;
  stroke-width: 1.8;
}
.snapshot-meter {
  height: 7px;
  overflow: hidden;
  border-radius: var(--os-radius-pill);
  background: rgba(255,255,255,0.065);
}
.snapshot-meter span {
  display: block;
  width: var(--meter, 0%);
  height: 100%;
  border-radius: inherit;
  background: var(--os-gradient-brand);
}
.launcher-card {
  min-height: 168px;
  color: var(--os-text-1);
  text-decoration: none;
}
.launcher-card.is-wide {
  grid-column: span 2;
}
.cardTop,
.cardHead {
  display: flex;
  align-items: center;
  gap: var(--os-space-3);
}
.cardArrow {
  margin-left: auto;
  color: var(--os-text-3);
}
.cardName {
  font-family: var(--os-font-display);
  font-size: var(--os-text-lg);
  font-weight: 600;
}
.empty-note {
  padding: var(--os-space-4);
  border: 1px dashed var(--os-border-2);
  border-radius: var(--os-radius-md);
  background: rgba(255,255,255,0.025);
}
.home-section {
  display: grid;
  gap: var(--os-space-4);
}
.floating-dock-row {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  margin-top: var(--os-space-2);
}
.home-dock {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  max-width: 100%;
  padding: 8px;
  border-radius: var(--os-radius-pill);
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(31,32,40,0.76);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 26px 70px -44px rgba(0,0,0,0.98);
  overflow-x: auto;
}
.home-dock a {
  display: grid;
  place-items: center;
  width: 46px;
  height: 46px;
  flex: 0 0 auto;
  color: var(--os-text-2);
  border-radius: var(--os-radius-pill);
  text-decoration: none;
  transition: color var(--os-duration-2) var(--os-ease-out), background var(--os-duration-2) var(--os-ease-out);
}
.home-dock a:hover,
.home-dock a:focus-visible {
  color: var(--os-text-1);
  background: rgba(255,255,255,0.095);
}
.home-dock svg {
  width: 19px;
  height: 19px;
}
.hero-panel {
  position: relative;
  z-index: 2;
  width: min(760px, 100%);
  margin: 0 auto;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--os-radius-xl);
  background: rgba(8,9,13,0.56);
  overflow: hidden;
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;
}
.hero-panel-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--os-space-3);
  padding: var(--os-space-4);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.hero-chart {
  position: relative;
  height: 148px;
  padding: var(--os-space-4);
}
.hero-chart svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.hero-chart-grid {
  position: absolute;
  inset: 0;
  opacity: 0.16;
  background-image: linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px);
  background-size: 100% 36px;
}
.hero-chart path {
  filter: drop-shadow(0 0 10px rgba(var(--os-success-rgb),0.35));
}
.mobile-home-nav {
  display: flex;
}
.srcPills {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: var(--os-space-2);
  margin-bottom: var(--os-space-5);
}
.srcPill {
  min-height: 60px;
  flex-direction: column;
}
.srcPill .srcEmoji {
  display: grid;
  place-items: center;
  color: var(--os-accent);
}
.howto {
  margin: var(--os-space-4) 0 var(--os-space-2);
  padding: var(--os-space-4);
  border: 1px solid var(--os-accent-line);
  background: var(--os-accent-soft);
  border-radius: var(--os-radius-md);
}
.howtoTitle {
  font-family: var(--os-font-display);
  font-weight: 600;
  margin-bottom: var(--os-space-3);
}
.howtoSteps {
  list-style: none;
  margin: 0;
  padding: 0;
  counter-reset: step;
  display: grid;
  gap: var(--os-space-3);
}
.howtoSteps li {
  position: relative;
  padding-left: 34px;
  color: var(--os-text-2);
  line-height: 1.5;
  counter-increment: step;
}
.howtoSteps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 0;
  display: grid;
  place-items: center;
  width: 22px;
  height: 22px;
  border-radius: var(--os-radius-pill);
  background: var(--os-accent);
  color: var(--os-text-invert);
  font-family: var(--os-font-display);
  font-size: var(--os-text-xs);
  font-weight: 700;
}
.howtoChips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.howtoChip {
  padding: 3px 9px;
  border: 1px solid var(--os-border-1);
  border-radius: var(--os-radius-pill);
  background: var(--os-glass-2);
  color: var(--os-text-1);
  font-family: var(--os-font-mono);
  font-size: var(--os-text-2xs);
}
.howtoFoot {
  color: var(--os-text-3);
  font-size: var(--os-text-xs);
  line-height: 1.5;
}
@media (max-width: 980px) {
  .overview-grid,
  .snapshot-grid,
  .stat-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .launcher-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (min-width: 901px) {
  .mobile-home-nav {
    display: none;
  }
}
@media (max-width: 720px) {
  .command-hero {
    min-height: auto;
    padding: var(--os-space-5);
  }
  .hero-title {
    font-size: clamp(3rem, 16vw, 4.35rem);
  }
  .hero-panel {
    display: none;
  }
  .command-hero-top,
  .command-hero-bottom,
  .snapshot-head,
  .dock-head {
    align-items: flex-start;
    flex-direction: column;
  }
  .themeSeg {
    margin-left: 0;
    max-width: 100%;
    overflow-x: auto;
  }
  .overview-grid,
  .snapshot-grid,
  .stat-grid,
  .launcher-grid,
  .vitals-stage,
  .srcPills {
    grid-template-columns: 1fr;
  }
  .snapshot-card.is-wide,
  .launcher-card.is-wide {
    grid-column: auto;
  }
  .command-search {
    width: 100%;
  }
}
@media (prefers-reduced-motion: reduce) {
  .ticker-track {
    animation: none;
  }
  .ticker-viewport {
    overflow-x: auto;
  }
}
</style>

];

function iconSvg(name){
  const icons = {

/* ============================================================
 * Shared health record — the suite-wide vitals bridge.
 * Whoop publishes it from the Whoop tab; this hub lets non-Whoop
 * users enter it manually (or tag it as Apple Watch). Supplements
 * reads it to drive its recovery/sleep recommendations.
 * ============================================================ */
const HEALTH_KEY = 'patron_health_v1';
const LEGACY_WHOOP_KEY = 'patron_whoop_data_v1';
function loadHealth(){
  try {
    let r = localStorage.getItem(HEALTH_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return d; }
    r = localStorage.getItem(LEGACY_WHOOP_KEY);
    if (r) { const d = JSON.parse(r); if (d && d.connected) return Object.assign({ source: 'whoop' }, d); }
  } catch(e){}
  return null;
}
function saveHealth(d){ try { localStorage.setItem(HEALTH_KEY, JSON.stringify(d)); } catch(e){} }
function clearHealth(){ try { localStorage.removeItem(HEALTH_KEY); } catch(e){} }
let health = loadHealth();

/* ---- Live WHOOP sync via the /api serverless OAuth flow (deployed host only) ---- */
const ON_SERVER = location.protocol === 'http:' || location.protocol === 'https:';
let whoopStatus = { connected: false, checked: false };
async function syncWhoop(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/whoop/data', { cache: 'no-store' });
    const j = await r.json();
    whoopStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'whoop', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'whoop') {
      clearHealth(); health = null; // token expired/disconnected — drop stale Whoop data
    }
  } catch (e) { whoopStatus = { connected: false, checked: true }; }
  render();
}

/* ---- Live Fitbit sync — same serverless OAuth pattern as Whoop ---- */
let fitbitStatus = { connected: false, checked: false };
async function syncFitbit(){
  if (!ON_SERVER) return;
  try {
    const r = await fetch('/api/fitbit/data', { cache: 'no-store' });
    const j = await r.json();
    fitbitStatus = { connected: !!j.connected, checked: true };
    if (j.connected) {
      health = { source: 'fitbit', connected: true, ts: j.ts || Date.now(), recovery: j.recovery, sleepHours: j.sleepHours, sleepPerf: j.sleepPerf, sleepTargetHours: j.sleepTargetHours || 8, bedtime: j.bedtime, wakeTime: j.wakeTime, hrv: j.hrv, rhr: j.rhr, strain: j.strain };
      saveHealth(health);
    } else if (health && health.source === 'fitbit') {
      clearHealth(); health = null; // token expired/disconnected — drop stale Fitbit data
    }
  } catch (e) { fitbitStatus = { connected: false, checked: true }; }
  render();
}

function recTone(r){ if (r == null) return 'muted'; if (r >= 67) return 'good'; if (r >= 34) return 'watch'; return 'low'; }
function formatHM(h){ if (h == null) return '—'; const hh = Math.floor(h); const mm = Math.round((h - hh) * 60); return hh + 'h ' + String(mm).padStart(2,'0') + 'm'; }
function formatClock(t){ if (!t) return '—'; const [h, m] = String(t).split(':').map(Number); if (!isFinite(h)) return esc(t); const ap = h < 12 ? 'am' : 'pm'; const h12 = h % 12 === 0 ? 12 : h % 12; return h12 + ':' + String(m || 0).padStart(2,'0') + ap; }
function ago(ts){ if (!ts) return ''; const m = Math.max(0, Math.round((Date.now() - ts) / 60000)); if (m < 1) return 'just now'; if (m < 60) return m + 'm ago'; return Math.round(m / 60) + 'h ago'; }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let financeRates = { AUD: 1, CHF: 1, USD: 1, EUR: 1, GBP: 1 };
function lsGet(key){ try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e){ return null; } }
function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }
function fmtFinanceAmount(amountCHF){
  const amount = (Number(amountCHF) || 0) * (financeRates.AUD || 1);
  return 'AUD ' + fmtNum(amount);
}
function localDateKey(d){ d = d || new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function activeDateKey(){ const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return localDateKey(d); }
function statFor(file){
  try {
    if (file === 'finance.html') { const s = lsGet('finance_standalone_v1'); if (s && Array.isArray(s.accounts) && s.accounts.length) { const nw = s.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); return { value: fmtFinanceAmount(nw), label: 'net worth' }; } }
    else if (file === 'supplements.html') { const s = lsGet('supplements_standalone_v1'); if (s && Array.isArray(s.items) && s.items.length) { const tk = (s.taken && s.taken[activeDateKey()]) || {}; const n = s.items.filter(i => tk[i.id]).length; return { value: n + '/' + s.items.length, label: 'taken today' }; } }
    else if (file === 'water.html') { const s = lsGet('water_standalone_v1'); if (s && s.logs) { const n = s.logs[localDateKey()] || 0; return { value: String(n), label: (n === 1 ? 'drink' : 'drinks') + ' today' }; } }
    else if (file === 'whoop.html') { if (health && health.recovery != null) return { value: Math.round(health.recovery) + '%', label: 'recovery' }; }
    else if (file === 'goals.html') { const s = goalSnapshot(); if (s.total) return { value: s.done + '/' + s.total, label: 'goals done' }; }
    else if (file === 'gym.html') { return loggedGymToday() ? { value: 'Done', label: 'logged today' } : null; }
  } catch (e) {}
  return null;
}

/* ============================================================
 * Live ticker — collect every metric the suite currently knows
 * into a scrolling marquee. Each item: short label, value, unit,
 * a tone, and a small accent sparkline. Accent lines are decorative
 * (we don't yet log history) except where a real delta exists.
 * ============================================================ */
function sparkSvg(seed){
  // deterministic, gently-varying micro-line ending in a glowing dot
  const w = 46, h = 16, n = 6, pad = 2;
  const pts = [];
  for (let i = 0; i < n; i++){
    const t = (Math.sin(seed * 1.7 + i * 1.3) + Math.sin(seed * 0.6 + i * 0.7)) / 2; // -1..1, stable
    const x = pad + (i / (n - 1)) * (w - pad * 2);
    const y = pad + (1 - (t * 0.5 + 0.5)) * (h - pad * 2);
    pts.push([x, y]);
  }
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length - 1];
  return '<svg class="tiSpark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" aria-hidden>'

function tickerMetrics(){
  const out = [];
  const add = (label, value, unit, tone, delta) => out.push({ label, value, unit: unit || '', tone: tone || 'brand', delta: delta || '' });
  const h = health;
  if (h){
    if (h.recovery != null) add('REC', Math.round(h.recovery), '%', recTone(h.recovery));
    if (h.sleepHours != null){ const hh = Math.floor(h.sleepHours), mm = Math.round((h.sleepHours - hh) * 60); add('SLP', hh + 'h' + String(mm).padStart(2,'0'), '', h.sleepPerf != null ? (h.sleepPerf >= 85 ? 'good' : h.sleepPerf >= 60 ? 'watch' : 'low') : 'brand'); }
    if (h.strain != null) add('STR', (Math.round(h.strain * 10) / 10).toFixed(1), '', 'brand');
    if (h.hrv != null) add('HRV', Math.round(h.hrv), 'ms', 'good');
    if (h.rhr != null) add('RHR', Math.round(h.rhr), 'bpm', 'brand');
  }
  try {
    const fin = lsGet('finance_standalone_v1');
    if (fin && Array.isArray(fin.accounts) && fin.accounts.length){ const nw = fin.accounts.reduce((a,x)=>a+(Number(x.amountCHF)||0),0); add('NET', fmtFinanceAmount(nw), '', 'good'); }
    const wat = lsGet('water_standalone_v1');
    if (wat && wat.logs){ const n = wat.logs[localDateKey()] || 0; add('H2O', String(n), n === 1 ? 'drink' : 'drinks', 'brand'); }
    const sup = lsGet('supplements_standalone_v1');
    if (sup && Array.isArray(sup.items) && sup.items.length){ const tk = (sup.taken && sup.taken[activeDateKey()]) || {}; const n = sup.items.filter(i => tk[i.id]).length; add('SUP', n + '/' + sup.items.length, '', n >= sup.items.length ? 'good' : 'brand'); }
  } catch(e){}
  return out;
}
function tickerHtml(){
  const items = tickerMetrics();

      + '<div class="empty-note">No live metrics yet. Add vitals, water, supplements, or finance data to bring the strip online.</div></section>';
  }

    + '<span class="ticker-label">' + esc(m.label) + '</span>'
    + '<span class="ticker-value">' + esc(m.value) + (m.unit ? '<span class="ticker-unit">' + esc(m.unit) + '</span>' : '') + '</span>'

function saveVitals(){
  const num = (id) => { const el = document.getElementById(id); if (!el || el.value === '') return null; const n = Number(el.value); return isFinite(n) ? n : null; };
  const str = (id) => { const el = document.getElementById(id); return el && el.value ? el.value : null; };
  const recovery = num('f-rec');
  const bedtime = str('f-bed');
  const wakeTime = str('f-wake');
  // Hours-asleep priority: explicit field → otherwise derive from bed/wake times (wake assumed next morning if earlier than bed).
  let sleepHours = num('f-sleep');
  if (sleepHours == null && bedtime && wakeTime){
    const [bh, bm] = bedtime.split(':').map(Number);
    const [wh, wm] = wakeTime.split(':').map(Number);
    let mins = (wh * 60 + wm) - (bh * 60 + bm);
    if (mins <= 0) mins += 24 * 60;
    sleepHours = Math.round((mins / 60) * 10) / 10;
  }
  const hrv = num('f-hrv');
  const rhr = num('f-rhr');
  const target = num('f-target') || 8;
  if (recovery == null && sleepHours == null && hrv == null && rhr == null) { alert('Enter at least one value (recovery, sleep, or bed + wake times).'); return; }
  const sleepPerf = sleepHours != null ? Math.round(Math.min(100, (sleepHours / target) * 100)) : null;
  health = { source: ui.draftSource, connected: true, ts: Date.now(), recovery, sleepHours, sleepPerf, sleepTargetHours: target, bedtime, wakeTime, hrv, rhr, strain: null };
  saveHealth(health);
  ui.modalOpen = false;
  render();
}

  try {
    const q = new URLSearchParams(location.search);
    const w = q.get('whoop'), f = q.get('fitbit');
    if (w || f) {
      history.replaceState(null, '', location.pathname);
      if (w === 'error' || w === 'denied') alert('Whoop connection didn’t complete. Check your WHOOP_CLIENT_ID / SECRET and the registered redirect URL (see WHOOP_SETUP.md), then try again.');
      if (f === 'error' || f === 'denied') alert('Fitbit connection didn’t complete. Check your FITBIT_CLIENT_ID / SECRET and the registered redirect URL (see FITBIT_SETUP.md), then try again.');
    }
  } catch (e) {}
  syncWhoop();
  syncFitbit();
})();
</script>
